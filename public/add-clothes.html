
<!DOCTYPE html>
<html lang="ko">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>옷 등록</title>

    <link rel="stylesheet"
          href="css/style.css">

</head>

<body>

<div class="container">

    <h1>옷 등록</h1>

    <input
        type="text"
        id="name"
        placeholder="옷 이름">

    <select id="category">
        <option value="상의">상의</option>
        <option value="하의">하의</option>
        <option value="아우터">아우터</option>
        <option value="신발">신발</option>
        <option value="모자">모자</option>
        <option value="가방">가방</option>
        <option value="악세서리">악세서리</option>
    </select>

    <select id="color">
        <option>화이트</option>
        <option>블랙</option>
        <option>그레이</option>
        <option>네이비</option>
        <option>베이지</option>
        <option>브라운</option>
        <option>카키</option>
        <option>레드</option>
        <option>블루</option>
        <option>그린</option>
        <option>옐로우</option>
        <option>핑크</option>
        <option>퍼플</option>
        <option>오렌지</option>
    </select>

    <select id="season">
        <option>봄</option>
        <option>여름</option>
        <option>가을</option>
        <option>겨울</option>
        <option>사계절</option>
    </select>

    <select id="style">
        <option>캐주얼</option>
        <option>미니멀</option>
        <option>스트릿</option>
        <option>댄디</option>
        <option>스포츠</option>
        <option>포멀</option>
    </select>

    <input
        type="text"
        id="brand"
        placeholder="브랜드">

    <select id="size">
        <option>S</option>
        <option>M</option>
        <option>L</option>
        <option>XL</option>
        <option>XXL</option>
    </select>

    <button id="addBtn">
        등록
    </button>

</div>

<script src="js/add-clothes.js"></script>

</body>
</html>
