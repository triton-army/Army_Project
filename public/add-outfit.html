<!DOCTYPE html>
<html lang="ko">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>코디 등록</title>

    <link rel="stylesheet"
          href="css/style.css">

</head>

<body>

<div class="container">

    <h1>코디 등록</h1>

    <input
        type="text"
        id="title"
        placeholder="코디 제목">

    <textarea
        id="description"
        placeholder="코디 설명"
        rows="4"></textarea>

    <h3>상의</h3>

    <select id="top">
        <option value="">선택 안 함</option>
    </select>

    <h3>하의</h3>

    <select id="bottom">
        <option value="">선택 안 함</option>
    </select>

    <h3>신발</h3>

    <select id="shoes">
        <option value="">선택 안 함</option>
    </select>

    <h3>아우터</h3>

    <select id="outer">
        <option value="">선택 안 함</option>
    </select>

    <button id="saveBtn">
        코디 등록
    </button>

</div>

<script src="js/add-outfit.js"></script>

</body>

</html>
