<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Closet AI</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <header>
        <h1>Closet AI</h1>
        <button id="logoutBtn">로그아웃</button>
    </header>

    <main class="container">
        <h2 id="welcome">환영합니다.</h2>

        <div class="card">
            <h3>👕 내 옷장</h3>
            <p>등록된 옷을 관리합니다.</p>
        </div>

        <div class="card">
            <h3>🌤 오늘의 날씨</h3>
            <p>현재 날씨를 확인합니다.</p>
        </div>

        <div class="card">
            <h3>🤖 AI 코디 추천</h3>
            <p>날씨와 옷장을 기반으로 추천받습니다.</p>
        </div>

        <div class="card">
            <h3>🌎 커뮤니티</h3>
            <p>다른 사람의 코디를 둘러봅니다.</p>
        </div>
    </main>

    <script src="js/main.js"></script>
</body>
</html>
